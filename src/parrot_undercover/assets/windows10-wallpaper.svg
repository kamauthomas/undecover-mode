<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="46%" r="72%" fx="50%" fy="46%">
      <stop offset="0%" stop-color="#0a3a7a"/>
      <stop offset="38%" stop-color="#062a5c"/>
      <stop offset="70%" stop-color="#031a3a"/>
      <stop offset="100%" stop-color="#010c1e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="30%">
      <stop offset="0%" stop-color="#1890e8" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#0a5ab0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#031a3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="46%" r="16%">
      <stop offset="0%" stop-color="#7ad4ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1890e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beamL" x1="1" x2="0" y1="0.5" y2="0.5">
      <stop offset="0%" stop-color="#5ac8ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a5ab0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamR" x1="0" x2="1" y1="0.5" y2="0.5">
      <stop offset="0%" stop-color="#5ac8ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a5ab0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pane-tl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a0e8ff"/>
      <stop offset="40%" stop-color="#5cc8ff"/>
      <stop offset="100%" stop-color="#2098e0"/>
    </linearGradient>
    <linearGradient id="pane-tr" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8f0ff"/>
      <stop offset="35%" stop-color="#6cd8ff"/>
      <stop offset="100%" stop-color="#28a0e8"/>
    </linearGradient>
    <linearGradient id="pane-bl" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1870c0"/>
      <stop offset="50%" stop-color="#2088d8"/>
      <stop offset="100%" stop-color="#3898e0"/>
    </linearGradient>
    <linearGradient id="pane-br" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2080d0"/>
      <stop offset="45%" stop-color="#38a0e8"/>
      <stop offset="100%" stop-color="#50b8f0"/>
    </linearGradient>
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="rayBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Deep dark blue background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Ambient glow behind logo -->
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect width="1920" height="1080" fill="url(#innerGlow)"/>

  <!-- Light beams radiating from center -->
  <g filter="url(#rayBlur)">
    <!-- Upper-left diagonal -->
    <polygon points="880,440 300,80 340,80" fill="#3ab0ff" opacity="0.06"/>
    <polygon points="880,440 180,200 220,200" fill="#3ab0ff" opacity="0.04"/>
    <!-- Upper-right diagonal -->
    <polygon points="1040,440 1580,80 1620,80" fill="#3ab0ff" opacity="0.06"/>
    <polygon points="1040,440 1700,200 1740,200" fill="#3ab0ff" opacity="0.04"/>
    <!-- Lower-left diagonal -->
    <polygon points="880,600 260,980 300,980" fill="#2088d0" opacity="0.05"/>
    <!-- Lower-right diagonal -->
    <polygon points="1040,600 1620,1000 1660,1000" fill="#2088d0" opacity="0.05"/>
    <!-- Horizontal beams -->
    <rect x="0" y="490" width="780" height="3" fill="url(#beamL)" opacity="0.6"/>
    <rect x="1140" y="490" width="780" height="3" fill="url(#beamR)" opacity="0.6"/>
    <rect x="0" y="560" width="780" height="2" fill="url(#beamL)" opacity="0.3"/>
    <rect x="1140" y="560" width="780" height="2" fill="url(#beamR)" opacity="0.3"/>
  </g>

  <!-- Broad glow behind the logo -->
  <g filter="url(#softGlow)">
    <rect x="810" y="380" width="300" height="280" rx="8" fill="#48c0ff" opacity="0.25"/>
  </g>

  <!-- Logo glow layer -->
  <g filter="url(#logoGlow)">
    <path d="M840,388 L940,368 L940,490 L840,500 Z" fill="#70d8ff" opacity="0.7"/>
    <path d="M955,365 L1080,340 L1080,486 L955,496 Z" fill="#80e0ff" opacity="0.7"/>
    <path d="M840,515 L940,508 L940,638 L840,618 Z" fill="#2898e0" opacity="0.7"/>
    <path d="M955,505 L1080,498 L1080,660 L955,638 Z" fill="#40a8e8" opacity="0.7"/>
  </g>

  <!-- Windows logo: four perspective panes -->
  <g>
    <!-- Top-left pane -->
    <path d="M842,392 L938,372 L938,488 L842,498 Z" fill="url(#pane-tl)" opacity="0.92"/>
    <!-- Top-right pane -->
    <path d="M953,369 L1078,344 L1078,484 L953,494 Z" fill="url(#pane-tr)" opacity="0.92"/>
    <!-- Bottom-left pane -->
    <path d="M842,513 L938,506 L938,634 L842,614 Z" fill="url(#pane-bl)" opacity="0.92"/>
    <!-- Bottom-right pane -->
    <path d="M953,503 L1078,496 L1078,656 L953,634 Z" fill="url(#pane-br)" opacity="0.92"/>
  </g>

  <!-- Highlight edges on panes -->
  <g opacity="0.4">
    <path d="M842,392 L938,372" stroke="#d0f0ff" stroke-width="1" fill="none"/>
    <path d="M953,369 L1078,344" stroke="#d0f0ff" stroke-width="1" fill="none"/>
    <path d="M938,372 L938,488" stroke="#b8e8ff" stroke-width="0.5" fill="none"/>
    <path d="M1078,344 L1078,484" stroke="#b8e8ff" stroke-width="0.5" fill="none"/>
  </g>

  <!-- Subtle lens flare spots -->
  <circle cx="1078" cy="344" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="938" cy="372" r="3" fill="#ffffff" opacity="0.2"/>
  <circle cx="1078" cy="484" r="2" fill="#a0d8ff" opacity="0.15"/>

  <!-- Very faint horizontal light streaks -->
  <rect x="0" y="496" width="1920" height="1" fill="#90d0ff" opacity="0.04"/>
  <rect x="0" y="530" width="1920" height="1" fill="#90d0ff" opacity="0.03"/>

  <!-- Bottom vignette -->
  <rect width="1920" height="1080" fill="url(#bg)" opacity="0.15"/>
</svg>
